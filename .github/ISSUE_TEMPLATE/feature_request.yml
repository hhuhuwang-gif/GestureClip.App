name: 功能建议
about: 提出 GestureClip 功能或体验建议
labels: enhancement
body:
  - type: markdown
    attributes:
      value: |
        请描述你想解决的问题，不要上传剪贴板正文、密码、token、cookie 或其他敏感信息。
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 当前哪里不方便？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 你期望的效果
      description: 希望 GestureClip 怎么做？
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: 参考产品或截图
      description: 如果有参考软件、截图或录屏，可以放这里。请避免敏感内容。
