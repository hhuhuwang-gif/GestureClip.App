name: Bug 反馈
about: 反馈 GestureClip 使用中的问题
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请不要上传剪贴板正文、密码、token、cookie 或其他敏感信息。
  - type: input
    id: version
    attributes:
      label: GestureClip 版本
      placeholder: 例如 v0.5.1 Beta
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: 例如 Windows 11 23H2
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: 使用包类型
      options:
        - 完整包
        - 覆盖更新包
        - 本地源码运行
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 用大白话说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: dropdown
    id: reproducible
    attributes:
      label: 是否稳定复现
      options:
        - 每次都能
        - 偶尔出现
        - 只出现一次
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: 截图 / 录屏 / 诊断包
      description: 可以附截图、录屏或诊断包。上传前请确认不含敏感信息。
