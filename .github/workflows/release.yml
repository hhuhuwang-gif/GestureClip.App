name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build Windows x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Package
        shell: pwsh
        run: .\scripts\publish-win-x64.ps1

      - name: Sign (optional)
        if: ${{ secrets.GESTURECLIP_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        env:
          GESTURECLIP_SIGN_PASSWORD: ${{ secrets.GESTURECLIP_SIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "gestureclip-codesign.pfx"
          $bytes = [Convert]::FromBase64String("${{ secrets.GESTURECLIP_SIGN_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          $env:GESTURECLIP_SIGN_PFX = $pfxPath
          .\scripts\sign-release.ps1 -Path .\artifacts\release\GestureClip
          if (Test-Path .\artifacts\release\GestureClip-Setup-*.exe) {
            Get-ChildItem .\artifacts\release\GestureClip-Setup-*.exe | ForEach-Object {
              .\scripts\sign-release.ps1 -Path $_.FullName
            }
          }

      - name: Build Setup package
        shell: pwsh
        run: .\scripts\build-setup.ps1 -SkipPublish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GestureClip-win-x64
          path: |
            artifacts/release/*.zip
            artifacts/release/*.exe
            artifacts/release/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/*.zip
            artifacts/release/*.exe
            artifacts/release/SHA256SUMS.txt
          generate_release_notes: true
